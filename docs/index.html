<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

    * { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    body { background: #fafbfc; color: #111827; }

    /* 스크롤바 커스텀 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f3f4f6; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    /* 글로우 효과 제거 (라이트 테마) */
    .glow-buy  { box-shadow: none; }
    .glow-sell { box-shadow: none; }
    .glow-hold { box-shadow: none; }

    /* 채팅 버블 */
    .bubble-left  { border-radius: 4px 18px 18px 18px; }
    .bubble-right { border-radius: 18px 4px 18px 18px; }

    /* 펄스 애니메이션 */
    @keyframes pulse-slow { 0%,100%{opacity:1} 50%{opacity:.6} }
    .pulse-slow { animation: pulse-slow 3s infinite; }

    /* 카드 스타일 (라이트 테마) */
    .card-gradient { background: #ffffff; border: 1px solid #e5e7eb; }
    .header-gradient { background: #ffffff; border-bottom: 1px solid #e5e7eb; }

    /* 진행바 */
    .progress-bar { transition: width 1s ease-in-out; }

    /* 태그 */
    .tag-buy  { background: #ecfdf5; color: #059669; border: 1px solid #d1fae5; }
    .tag-sell { background: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
    .tag-hold { background: #fffbeb; color: #d97706; border: 1px solid #fef3c7; }
  </style>
</head>

    const stanceColor = { BUY:"text-green-600", HOLD:"text-amber-600", SELL:"text-red-600" };
    const stanceBg    = { BUY:"tag-buy",        HOLD:"tag-hold",        SELL:"tag-sell" };
    const stanceGlow  = { BUY:"glow-buy",       HOLD:"glow-hold",       SELL:"glow-sell" };

    // ─── 컴포넌트 ──────────────────────────────────────────────────────────

    function Header({ date, generatedAt }) {
      const d = new Date(generatedAt);
      const timeStr = isNaN(d) ? "" : d.toLocaleTimeString("ko-KR", { hour:"2-digit", minute:"2-digit" });
      return (
        <div className="header-gradient px-6 py-5 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
          <div className="flex items-center gap-3">
            <div className="text-3xl">🇰🇷</div>
            <div>
              <h1 className="text-xl font-black tracking-tight text-gray-900">Korean Stock Agent</h1>
              <p className="text-xs text-gray-500 mono">QUARTET MULTI-AGENT DEBATE SYSTEM</p>
            </div>
          </div>
          <div className="text-right">
            <div className="text-sm font-semibold text-gray-700">{date}</div>
            {timeStr && <div className="text-xs text-gray-500">생성 {timeStr}</div>}
          </div>
        </div>
      );
    }

    function MarketCard({ label, value, changePct, sub }) {
      const up = changePct > 0;
      return (
        <div className="card-gradient rounded-lg p-4">
          <div className="text-xs text-gray-600 mb-1">{label}</div>
          <div className="text-xl font-bold mono text-gray-900">{value}</div>
          <div className={`text-sm font-semibold mt-1 ${up ? "text-green-600" : changePct < 0 ? "text-red-600" : "text-gray-500"}`}>
            {pct(changePct)}
          </div>
          {sub && <div className="text-xs text-gray-500 mt-1">{sub}</div>}
        </div>
      );
    }

    function MarketOverview({ data }) {
      const k = data.kospi, q = data.kosdaq, n = data.nasdaq;
      return (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
          <MarketCard label="KOSPI" value={k.close?.toLocaleString()} changePct={k.change_pct} sub={`거래량 ${k.volume_change_pct > 0 ? "↑" : "↓"}${Math.abs(k.volume_change_pct).toFixed(1)}%`} />
          <MarketCard label="KOSDAQ" value={q.close?.toLocaleString()} changePct={q.change_pct} />
          <MarketCard label="NASDAQ" value={n.close?.toLocaleString()} changePct={n.change_pct} />
          <div className="card-gradient rounded-lg p-4">
            <div className="text-xs text-gray-600 mb-1">외환·금리</div>
            <div className="text-base font-bold mono text-gray-900">{data.usdkrw?.toLocaleString()}원</div>
            <div className="text-xs text-gray-600 mt-1">USD/KRW</div>
            <div className="text-sm mono text-amber-600 mt-1">{data.us10y}% <span className="text-xs text-gray-500">US 10Y</span></div>
          </div>
        </div>
      );
    }

    function WeatherCard({ verdict }) {
      const { investment_weather_icon: icon, investment_weather_kr: label,
              final_stance: stance, confidence_score: conf, summary } = verdict;
      const colors = {
        BUY:  "bg-green-50 border-green-200",
        HOLD: "bg-yellow-50 border-yellow-200",
        SELL: "bg-red-50 border-red-200",
      };
      const textColors = {
        BUY:  "text-green-900",
        HOLD: "text-yellow-900",
        SELL: "text-red-900",
      };
      return (
        <div className={`rounded-xl p-6 border ${colors[stance] || colors.HOLD} mb-6`}>
          <div className="flex flex-col md:flex-row md:items-center gap-4">
            <div className="text-center md:text-left">
              <div className="text-6xl mb-2">{icon}</div>
              <div className={`text-lg font-bold ${textColors[stance]}`}>{label}</div>
            </div>
            <div className="flex-1">
              <div className="flex items-center gap-3 mb-3">
                <span className={`px-3 py-1 rounded-full text-sm font-bold ${stanceBg[stance]}`}>{stance}</span>
                <span className="text-gray-600 text-sm">확신도</span>
                <div className="flex-1 bg-gray-200 rounded-full h-2 max-w-32">
                  <div className={`h-2 rounded-full progress-bar ${stance==="BUY"?"bg-green-600":stance==="SELL"?"bg-red-600":"bg-amber-600"}`}
                    style={{ width:`${conf}%` }} />
                </div>
                <span className="mono text-sm font-bold text-gray-900">{conf}%</span>
              </div>
              <p className="text-sm text-gray-700 leading-relaxed">{summary}</p>
            </div>
          </div>
        </div>
      );
    }

    function TechnicalIndicators({ ti }) {
      if (!ti) return null;
      const rsiColor = ti.rsi > 70 ? "text-red-600" : ti.rsi < 30 ? "text-green-600" : "text-blue-600";
      const macdColor = ti.histogram > 0 ? "text-green-600" : "text-red-600";
      return (
        <div className="card-gradient rounded-lg p-4 mb-6">
          <h3 className="text-sm font-bold text-gray-900 mb-3">📈 기술적 지표 (KOSPI)</h3>
          <div className="grid grid-cols-3 md:grid-cols-6 gap-3 text-center">
            {[
              { label:"RSI(14)", val: ti.rsi?.toFixed(1), color: rsiColor },
              { label:"MACD",    val: ti.macd?.toFixed(2), color: macdColor },
              { label:"볼린저%", val: (ti.bb_position*100)?.toFixed(0)+"%", color:"text-purple-600" },
              { label:"MA5",     val: ti.ma5?.toLocaleString(), color:"text-gray-700" },
              { label:"MA20",    val: ti.ma20?.toLocaleString(), color:"text-gray-700" },
              { label:"MA60",    val: ti.ma60?.toLocaleString(), color:"text-gray-700" },
            ].map(({ label, val, color }) => (
              <div key={label} className="bg-gray-100 rounded-lg p-2">
                <div className="text-xs text-gray-600 mb-1">{label}</div>
                <div className={`text-sm font-bold mono ${color}`}>{val}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function AgentStanceCards({ reports, stanceVotes }) {
      return (
        <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
          {reports.map(r => (
            <div key={r.agent_name} className="card-gradient rounded-lg p-4">
              <div className="text-3xl mb-2">{r.avatar}</div>
              <div className="text-sm font-bold text-gray-900">{r.agent_name}</div>
              <div className="text-xs text-gray-600 mb-2">{r.role}</div>
              <div className={`inline-block px-2 py-0.5 rounded text-xs font-bold ${stanceBg[r.stance]}`}>{r.stance}</div>
              <div className="mt-2">
                <div className="flex items-center gap-1">
                  <div className="flex-1 bg-gray-200 rounded-full h-1.5">
                    <div className={`h-1.5 rounded-full ${r.stance==="BUY"?"bg-green-600":r.stance==="SELL"?"bg-red-600":"bg-amber-600"}`}
                      style={{ width:`${r.confidence_score}%` }} />
                  </div>
                  <span className="text-xs mono text-gray-600">{r.confidence_score}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function DebateTimeline({ reports, critiques }) {
      const [expanded, setExpanded] = useState(null);
      const allMessages = [];
      // Phase 1 보고서
      reports.forEach((r, i) => allMessages.push({ type:"report", data:r, idx:i }));
      // Phase 2 반론
      critiques.forEach((c, i) => allMessages.push({ type:"critique", data:c, idx:i }));

      return (
        <div className="card-gradient rounded-lg mb-6">
          <div className="p-4 border-b border-gray-200 flex items-center gap-2">
            <span className="text-lg">💬</span>
            <h3 className="font-bold text-gray-900">에이전트 토론 타임라인</h3>
            <span className="text-xs text-gray-600 ml-2">Phase 1 분석 → Phase 2 반론</span>
          </div>
          <div className="p-4 space-y-4 max-h-96 overflow-y-auto">
            {/* Phase 1 */}
            <div className="text-xs text-gray-600 font-semibold uppercase tracking-wider py-1 border-b border-gray-300">
              Phase 1 — 개별 분석 보고서
            </div>
            {reports.map((r, i) => (
              <div key={i} className={`flex gap-3 ${i % 2 === 0 ? "" : "flex-row-reverse"}`}>
                <div className="text-2xl flex-shrink-0">{r.avatar}</div>
                <div className={`max-w-[80%] ${i % 2 === 0 ? "bubble-left" : "bubble-right"} bg-gray-50 rounded-2xl p-3 border border-gray-200`}>
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-xs font-bold text-gray-900">{r.agent_name}</span>
                    <span className={`text-xs px-1.5 py-0.5 rounded font-bold ${stanceBg[r.stance]}`}>{r.stance}</span>
                    <span className="text-xs text-gray-600">{r.confidence_score}%</span>
                  </div>
                  <p className="text-xs text-gray-700 leading-relaxed">
                    {expanded === `r${i}` ? r.analysis : r.analysis.slice(0,120) + "..."}
                  </p>
                  <button onClick={() => setExpanded(expanded === `r${i}` ? null : `r${i}`)}
                    className="text-xs text-blue-600 mt-1 hover:text-blue-700">
                    {expanded === `r${i}` ? "접기" : "더 보기"}
                  </button>
                  {r.key_points && (
                    <div className="mt-2 space-y-1">
                      {r.key_points.slice(0,2).map((kp, j) => (
                        <div key={j} className="text-xs text-gray-600 flex gap-1">
                          <span className="text-blue-600">▸</span>{kp}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            ))}
            {/* Phase 2 */}
            <div className="text-xs text-gray-600 font-semibold uppercase tracking-wider py-1 border-b border-gray-300 mt-4">
              Phase 2 — 교차 반론
            </div>
            {critiques.map((c, i) => {
              const fromReport = reports.find(r => r.agent_name === c.from_agent);
              const isRight = i % 2 !== 0;
              return (
                <div key={i} className={`flex gap-3 ${isRight ? "flex-row-reverse" : ""}`}>
                  <div className="text-2xl flex-shrink-0">{fromReport?.avatar || "🤖"}</div>
                  <div className={`max-w-[80%] ${isRight ? "bubble-right" : "bubble-left"} bg-yellow-50 rounded-2xl p-3 border border-yellow-200`}>
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-xs font-bold text-amber-700">{c.from_agent}</span>
                      <span className="text-xs text-gray-600">→</span>
                      <span className="text-xs text-gray-700">{c.to_agent}</span>
                    </div>
                    <p className="text-xs text-gray-700 leading-relaxed">
                      {expanded === `c${i}` ? c.critique : c.critique.slice(0,120) + "..."}
                    </p>
                    <button onClick={() => setExpanded(expanded === `c${i}` ? null : `c${i}`)}
                      className="text-xs text-amber-700 mt-1 hover:text-amber-800">
                      {expanded === `c${i}` ? "접기" : "더 보기"}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function SectorHeatmap({ topSectors, topStocks }) {
      return (
        <div className="card-gradient rounded-lg mb-6">
          <div className="p-4 border-b border-gray-200 flex items-center gap-2">
            <span className="text-lg">🔥</span>
            <h3 className="font-bold text-gray-900">섹터 & 종목 현황</h3>
          </div>
          <div className="p-4">
            {topSectors && (
              <div className="mb-4">
                <div className="text-xs text-gray-600 mb-2">✨ 오늘의 주목 섹터 (Moderator 선정)</div>
                <div className="flex flex-wrap gap-2">
                  {topSectors.map((s, i) => (
                    <span key={i} className={`px-3 py-1 rounded-full text-xs font-bold
                      ${i===0?"bg-green-100 text-green-700 border border-green-300":
                        i===1?"bg-blue-100 text-blue-700 border border-blue-300":
                               "bg-purple-100 text-purple-700 border border-purple-300"}`}>
                      {i===0?"🥇":i===1?"🥈":"🥉"} {s}
                    </span>
                  ))}
                </div>
              </div>
            )}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
              {(topStocks || []).map((s, i) => {
                const up = s.change_pct > 0;
                const intensity = Math.min(Math.abs(s.change_pct) * 30, 80);
                return (
                  <div key={i} className="rounded-lg p-3 text-center border"
                    style={{
                      background: up
                        ? `rgba(5,150,105,${intensity/500})`
                        : `rgba(220,38,38,${intensity/500})`,
                      borderColor: up ? "rgba(5,150,105,0.3)" : "rgba(220,38,38,0.3)"
                    }}>
                    <div className="text-xs text-gray-700 font-medium truncate">{s.name}</div>
                    <div className={`text-sm font-bold mt-1 ${up?"text-green-700":"text-red-700"}`}>
                      {pct(s.change_pct)}
                    </div>
                    {s.close && <div className="text-xs text-gray-600 mono">{s.close.toLocaleString()}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function BacktestLeaderboard({ backtest }) {
      if (!backtest) return null;
      const { agent_rankings: rankings, yesterday_comparison: yc } = backtest;
      const hasData = rankings && rankings.length > 0 && rankings.some(r => r.total_predictions > 0);
      return (
        <div className="card-gradient rounded-lg mb-6">
          <div className="p-4 border-b border-gray-200 flex items-center gap-2">
            <span className="text-lg">🏆</span>
            <h3 className="font-bold text-gray-900">에이전트 적중률 리더보드</h3>
            <span className="text-xs text-gray-600 ml-2">누적 백테스트 기준</span>
          </div>
          <div className="p-4">
            {!hasData && (
              <div className="flex flex-col items-center justify-center py-6 text-center">
                <div className="text-3xl mb-3">📊</div>
                <p className="text-sm font-semibold text-gray-700 mb-1">데이터 누적 중</p>
                <p className="text-xs text-gray-600">다음 거래일 분석 후부터 적중률이 집계됩니다</p>
              </div>
            )}
            {hasData && <div className="space-y-3 mb-4">
              {(rankings || []).map((r, i) => (
                <div key={i} className="flex items-center gap-3">
                  <div className="text-lg w-8 text-center">{i===0?"🥇":i===1?"🥈":i===2?"🥉":"4️⃣"}</div>
                  <div className="text-xl">{r.avatar}</div>
                  <div className="flex-1">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-sm font-semibold text-gray-900">{r.name}</span>
                      <span className="text-xs mono text-gray-600">{r.correct}/{r.total_predictions}회</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="flex-1 bg-gray-200 rounded-full h-2">
                        <div className={`h-2 rounded-full progress-bar ${i===0?"bg-amber-400":i===1?"bg-gray-400":"bg-amber-700"}`}
                          style={{ width:`${r.hit_rate*100}%` }} />
                      </div>
                      <span className="mono text-sm font-bold text-gray-900 w-12 text-right">
                        {(r.hit_rate*100).toFixed(0)}%
                      </span>
                    </div>
                  </div>
                </div>
              ))}
            </div>}
            {yc && (
              <div className="bg-gray-100 rounded-lg p-3 border border-gray-300">
                <div className="text-xs text-gray-700 mb-2">
                  📅 전일({yc.date}) 실제 결과: <span className={yc.actual_movement==="UP"?"text-green-600":yc.actual_movement==="DOWN"?"text-red-600":"text-amber-600"}>
                    {yc.actual_movement==="UP"?"📈 상승":yc.actual_movement==="DOWN"?"📉 하락":"↔️ 횡보"}
                  </span>
                </div>
                <div className="flex flex-wrap gap-2">
                  {(yc.predictions || []).map((p, i) => (
                    <div key={i} className={`flex items-center gap-1 px-2 py-1 rounded-lg text-xs
                      ${p.was_correct?"bg-green-100 border border-green-300 text-green-700":"bg-red-100 border border-red-300 text-red-700"}`}>
                      <span>{p.avatar}</span>
                      <span className="font-semibold">{p.agent}</span>
                      <span className={stanceColor[p.prediction]}>{p.prediction}</span>
                      <span>{p.was_correct?"✓":"✗"}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function SupplyDemand({ data }) {
      const fNet = data.foreigners_net || 0;
      const iNet = data.institutions_net || 0;
      return (
        <div className="card-gradient rounded-lg mb-6 p-4">
          <h3 className="text-sm font-bold text-gray-900 mb-3">💹 투자자별 수급</h3>
          <div className="grid grid-cols-2 gap-4">
            {[{ label:"외국인", val:fNet, color:"text-blue-600" },
              { label:"기관",   val:iNet, color:"text-purple-600" }].map(({ label, val, color }) => (
              <div key={label} className="text-center">
                <div className="text-xs text-gray-600">{label}</div>
                <div className={`text-lg font-bold mono ${color}`}>
                  {val >= 0 ? "+" : ""}{val.toLocaleString()}억
                </div>
                <div className={`text-xs ${val >= 0 ? "text-green-600" : "text-red-600"}`}>
                  {val >= 0 ? "▲ 순매수" : "▼ 순매도"}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ActionItems({ verdict }) {
      return (
        <div className="card-gradient rounded-lg mb-6 p-4">
          <h3 className="text-sm font-bold text-gray-900 mb-3">📋 오늘의 실행 항목</h3>
          <div className="space-y-2">
            {(verdict.action_items || []).map((item, i) => (
              <div key={i} className="flex items-start gap-2">
                <span className="text-blue-600 text-xs mt-0.5">▸</span>
                <span className="text-sm text-gray-700">{item}</span>
              </div>
            ))}
          </div>
          <div className="mt-4">
            <div className="text-xs text-gray-700 mb-2">⚠️ 리스크 요인</div>
            <div className="flex flex-wrap gap-2">
              {(verdict.risk_factors || []).map((r, i) => (
                <span key={i} className="text-xs px-2 py-1 rounded bg-red-100 text-red-700 border border-red-300">{r}</span>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function Footer({ date, moderatorAgent }) {
      return (
        <div className="text-center py-8 text-xs text-gray-600">
          <div className="mb-1">🤖 Korean Stock Agent Quartet — Multi-Agent Debate System</div>
          <div>오늘의 Moderator: <span className="text-gray-700">{moderatorAgent}</span> | {date}</div>
          <div className="mt-1">⚠️ 본 보고서는 AI 생성 정보이며 투자 결정의 최종 책임은 투자자 본인에게 있습니다.</div>
        </div>
      );
    }

    // ─── 메인 앱 ─────────────────────────────────────────────────────────────
    function App() {
      const [report, setReport] = useState(null);
      const [loading, setLoading] = useState(true);
      const [usingSample, setUsingSample] = useState(false);

      useEffect(() => {
        fetch(`./data/daily_report.json?t=${Date.now()}`)
          .then(r => r.json())
          .then(data => { setReport(data); setLoading(false); })
          .catch(() => { setReport(SAMPLE); setUsingSample(true); setLoading(false); });
      }, []);

      if (loading) return (
        <div className="flex items-center justify-center h-screen bg-gray-50">
          <div className="text-center">
            <div className="text-5xl mb-4 pulse-slow">📊</div>
            <div className="text-gray-700 font-semibold">에이전트 분석 로딩 중...</div>
          </div>
        </div>
      );

      const { date, generated_at, market_data: md, debate, verdict, backtest } = report;

      return (
        <div className="min-h-screen">
          <Header date={date} generatedAt={generated_at} />
          {usingSample && (
            <div className="bg-yellow-100 border-b border-yellow-300 px-6 py-2 text-xs text-yellow-700 text-center">
              ⚠️ 샘플 데이터 표시 중 — GitHub Actions 자동화 후 실제 데이터로 업데이트됩니다
            </div>
          )}
          <div className="max-w-6xl mx-auto px-4 py-6">
            {/* 시장 개요 */}
            <MarketOverview data={md} />

            {/* 투자 기온 카드 */}
            <WeatherCard verdict={verdict} />

            {/* 기술적 지표 */}
            <TechnicalIndicators ti={md.technical_indicators} />

            {/* 2-column 레이아웃 */}
            <div className="grid md:grid-cols-2 gap-6 mb-0">
              {/* 왼쪽 */}
              <div>
                <AgentStanceCards reports={debate.phase1_reports} stanceVotes={verdict.stance_votes} />
                <SupplyDemand data={md} />
                <ActionItems verdict={verdict} />
              </div>
              {/* 오른쪽 */}
              <div>
                <SectorHeatmap topSectors={verdict.top_sectors} topStocks={md.top_stocks} />
                <BacktestLeaderboard backtest={backtest} />
              </div>
            </div>

            {/* 토론 타임라인 */}
            <DebateTimeline reports={debate.phase1_reports} critiques={debate.phase2_critiques} />

            <Footer date={date} moderatorAgent={verdict.today_moderator_agent} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
